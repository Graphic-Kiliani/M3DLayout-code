dataset:
  encoding_type: "diffusion"
  sample_num_points: 120 # max_length
  large_object_categories: ["appliances", "armchair", "bathtub", "bed", "beverage_fridge", "bookshelf",
                            "cabinet", "ceiling_lamp", "cell_shelf", "chair", "chaise_longue_sofa", "chest_of_drawers",
                            "children_cabinet", "chinese_chair", "coffee_table", "console_table",
                            "corner_side_table", "counter", "curtain", "dining_chair", "dining_table",
                            "dishwasher", "dressing_chair", "dressing_table", "floor_lamp",
                            "glass_panel_door", "kids_bed", "kitchen_cabinet", "kitchen_space",
                            "l_shaped_sofa", "large_plant_container", "large_shelf", "lazy_sofa",
                            "lighting", "lite_door", "lounge_chair", "louver_door", "loveseat_sofa",
                            "microwave", "mirror", "multi_seat_sofa", "nightstand", "oven", "panel_door",
                            "pendant_lamp", "rug", "seating", "shelf", "shelving", "shower", "side_table",
                            "sink", "sofa", "standing_sink", "stool", "table", "toilet", "tv",
                            "tv_monitor", "tv_stand", "wardrobe", "window", "wine_cabinet"]

  # Data augmentation settings
  enable_description_augmentation: true
  augmentation_probability: 0.8

  # Small object filtering for Infinigen data
  enable_small_object_filtering: true
  small_object_filtering_probability: 0.5

  # Sentence rewriting settings for style normalization
  enable_sentence_rewriting: true
  sentence_rewriting_probability: 0.6
  preserve_spatial_info: true

train_data:
  train_stats_file: "../data/m3dlayout/dataset_stats_train.json"
  json_files:
    - "../data/m3dlayout/3dfront_train.json"
    - "../data/m3dlayout/mp3d_train.json"
    - "../data/m3dlayout/infinigen_train.json"

val_data:
  train_stats_file: "../data/m3dlayout/dataset_stats_val.json"
  json_files:
    - "../data/m3dlayout/3dfront_val.json"
    - "../data/m3dlayout/mp3d_val.json"
    - "../data/m3dlayout/infinigen_val.json"

network:
  type: "diffusion_scene_layout_ddpm"
  net_type: "unet1d"

  point_dim: 110
  latent_dim: 0
  room_mask_condition: false
  text_condition: true
  text_embed_dim: 512
  sample_num_points: 120

  objectness_dim: 0
  class_dim: 102
  angle_dim: 2
  objfeat_dim: 0

  learnable_embedding: true
  instance_condition: true
  instance_emb_dim: 128

  diffusion_kwargs:
    schedule_type: "linear"
    beta_start: 0.0001
    beta_end: 0.02
    time_num: 1000
    loss_type: "mse"
    model_mean_type: "v"
    model_var_type: "fixedsmall"
    loss_separate: true
    loss_iou: true
    train_stats_file: "../data/m3dlayout/dataset_stats_train.json"

  net_kwargs:
    dim: 512
    dim_mults: [1, 1, 1, 1]
    channels: 110
    objectness_dim: 0
    class_dim: 102
    angle_dim: 2
    objfeat_dim: 0
    self_condition: true
    context_dim: 0
    instanclass_dim: 128
    seperate_all: true
    merge_bbox: true
    modulate_time_context_instanclass: true
    text_condition: true
    text_dim: 512

feature_extractor:
  name: "resnet18"
  feature_size: 64
  freeze_bn: true
  input_channels: 1

training:
  splits: ["train", "val"]
  epochs: 31000
  batch_size: 256
  save_frequency: 2000
  max_grad_norm: 10
  optimizer: Adam
  weight_decay: 0.0
  schedule: "step"
  lr: 0.0002
  lr_step: 10000
  lr_decay: 0.5

validation:
  splits: ["test"]
  frequency: 100000
  batch_size: 128
  gen_traj: false
  num_step: 100
  gen_gt: true
  gen_prob_map: false

logger:
  type: "wandb"
  project: "m3dlayout_diffusion"
  log_frequency: 10
